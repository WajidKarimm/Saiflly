version: '3.8'

services:
  # =============================================================================
  # PostgreSQL Database with PostGIS
  # =============================================================================
  postgresql:
    image: postgis/postgis:15-3.3
    container_name: nestsafely-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_change_this
      POSTGRES_DB: nestsafely
      POSTGRES_INITDB_ARGS: >
        --encoding=UTF8
        --locale=en_US.UTF-8
        --locale-provider=libc
    ports:
      - "5432:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
      # Load initial schema
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nestsafely-network

  # =============================================================================
  # Redis Cache
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: nestsafely-redis
    command: redis-server --requirepass redis_password_change_this --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      # Persist Redis data (optional)
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nestsafely-network

  # =============================================================================
  # PgAdmin (Database Management UI)
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nestsafely-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      SCRIPT_NAME: /pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgresql
    networks:
      - nestsafely-network

  # =============================================================================
  # Redis Commander (Redis Management UI)
  # =============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nestsafely-redis-commander
    environment:
      REDIS_HOSTS: "local:redis:6379:0:redis_password_change_this"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - nestsafely-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  nestsafely-network:
    driver: bridge

# =============================================================================
# Usage Instructions
# =============================================================================
# 
# Start all services:
#   docker compose up -d
#
# Stop all services:
#   docker compose down
#
# View logs:
#   docker compose logs -f
#
# Connect to PostgreSQL:
#   psql -h localhost -U postgres -d nestsafely
#
# PgAdmin Web UI:
#   http://localhost:5050
#   Login: admin@example.com / admin
#
# Redis Commander Web UI:
#   http://localhost:8081
#
# Stop and remove all data (WARNING):
#   docker compose down -v
#
# =============================================================================
